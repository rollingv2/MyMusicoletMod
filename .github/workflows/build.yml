name: Build Native Lib
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4 # Update ke v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4 # Update ke v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r25b

      - name: Build with Gradle
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Upload Result
        uses: actions/upload-artifact@v4 # INI PERBAIKANNYA (Update ke v4)
        with:
          name: native-libs-arm64
          # Sesuaikan path ini dengan lokasi hasil build .so kamu
          path: app/build/intermediates/cmake/release/obj/arm64-v8a/libpairipcore.so
